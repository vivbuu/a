here<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Змейка P2P</title>
    <style>
        body{margin:0;padding:10px;background:#1a1a2e;font-family:monospace;color:#fff;text-align:center;touch-action:none;user-select:none}
        canvas{border:2px solid #e94560;border-radius:8px;background:#16213e}
        #scores{display:flex;justify-content:center;gap:40px;margin:10px 0}
        .p1{color:#00ff88}.p2{color:#ff6b6b}
        button{background:#e94560;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:16px;cursor:pointer;margin:5px}
        button:active{background:#ff6b6b}
        input{padding:8px;border-radius:6px;border:2px solid #e94560;background:#16213e;color:#fff;font-size:14px;text-align:center;width:200px}
        #menu{margin:15px 0}
        #status{color:#f0c929;margin:10px 0;font-size:14px}
        .hidden{display:none}
        #winner{font-size:24px;margin-top:10px;color:#f0c929}
        textarea{width:90%;height:60px;background:#16213e;color:#0f0;border:1px solid #e94560;border-radius:6px;padding:5px;font-size:11px;resize:none;margin:5px}
    </style>
</head>
<body>
    <h2>🐍 P2P ДУЭЛЬ</h2>
    <div id="menu">
        <button onclick="create()">Создать</button>
        <br>
        <textarea id="myOffer" placeholder="Скопируй это и отправь другу" readonly></textarea>
        <br>
        <textarea id="peerOffer" placeholder="Вставь код друга сюда"></textarea>
        <br>
        <button onclick="join()">Подключиться</button>
    </div>
    <div id="status">Готов</div>
    <div id="gameArea" class="hidden">
        <div id="scores">
            <div class="p1">Ты: <span id="myScore">0</span></div>
            <div class="p2">Враг: <span id="enemyScore">0</span></div>
        </div>
        <canvas id="game"></canvas>
        <div id="winner"></div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const SIZE = 25;
        const W = 30, H = 20;
        canvas.width = W * SIZE;
        canvas.height = H * SIZE;
        const FOOD_COUNT = 5;

        let pc, dc, playerId, mySnake, enemySnake, myDir, foods;
        let myScore = 0, enemyScore = 0, alive = true, gameOver = false, gameLoop;
        let offerSent = false;

        // Локальный WebRTC без серверов — обмен через копипасту
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        function create() {
            playerId = 0;
            document.getElementById('status').textContent = 'Создаю...';

            mySnake = [{x:5,y:10},{x:4,y:10},{x:3,y:10}];
            myDir = {x:1,y:0};
            enemySnake = [{x:25,y:10},{x:26,y:10},{x:27,y:10}];
            foods = [];
            for(let i=0;i<FOOD_COUNT;i++) foods.push(randomFood());

            pc = new RTCPeerConnection(config);
            dc = pc.createDataChannel('game', { ordered: false });
            setupDC(dc);

            pc.onicecandidate = e => {
                if (e.candidate) updateOffer();
            };

            pc.createOffer().then(offer => {
                pc.setLocalDescription(offer);
                // Ждём ICE
                setTimeout(updateOffer, 2000);
            });

            document.getElementById('menu').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');
            startGameLoop();
        }

        function updateOffer() {
            if (offerSent) return;
            const offer = btoa(JSON.stringify(pc.localDescription));
            document.getElementById('myOffer').value = offer;
            document.getElementById('status').textContent = 'Скопируй код и отправь другу. Его код вставь ниже и нажми Подключиться.';
        }

        function join() {
            const peerData = document.getElementById('peerOffer').value.trim();
            if (!peerData) return;

            try {
                const remoteDesc = JSON.parse(atob(peerData));

                if (remoteDesc.type === 'offer') {
                    playerId = 1;
                    mySnake = [{x:25,y:10},{x:26,y:10},{x:27,y:10}];
                    myDir = {x:-1,y:0};
                    enemySnake = [{x:5,y:10},{x:4,y:10},{x:3,y:10}];

                    pc = new RTCPeerConnection(config);
                    pc.ondatachannel = e => {
                        dc = e.channel;
                        setupDC(dc);
                    };

                    pc.onicecandidate = e => {
                        if (e.candidate) {
                            setTimeout(() => {
                                const answer = btoa(JSON.stringify(pc.localDescription));
                                document.getElementById('myOffer').value = answer;
                                document.getElementById('status').textContent = 'Отправь ЭТОТ код обратно создателю. Он должен вставить его и нажать Подключиться.';
                            }, 2000);
                        }
                    };

                    pc.setRemoteDescription(new RTCSessionDescription(remoteDesc));
                    pc.createAnswer().then(answer => {
                        pc.setLocalDescription(answer);
                        setTimeout(() => {
                            const ans = btoa(JSON.stringify(pc.localDescription));
                            document.getElementById('myOffer').value = ans;
                            document.getElementById('status').textContent = 'Отправь этот код создателю.';
                        }, 2000);
                    });

                    document.getElementById('menu').classList.add('hidden');
                    document.getElementById('gameArea').classList.remove('hidden');
                    startGameLoop();
                } else if (remoteDesc.type === 'answer') {
                    pc.setRemoteDescription(new RTCSessionDescription(remoteDesc));
                    document.getElementById('status').textContent = 'Соединение установлено!';
                }
            } catch(e) {
                document.getElementById('status').textContent = 'Ошибка: неверный код';
            }
        }

        function setupDC(channel) {
            dc = channel;
            dc.onopen = () => {
                document.getElementById('status').textContent = 'Соединение установлено!';
                if (playerId === 0) {
                    // Отправляем еду
                    dc.send(JSON.stringify({ type: 'foods', foods }));
                }
            };
            dc.onmessage = e => {
                const data = JSON.parse(e.data);
                if (data.type === 'update') {
                    enemySnake = data.snake;
                    enemyScore = data.score;
                    document.getElementById('enemyScore').textContent = enemyScore;
                }
                if (data.type === 'foods') {
                    foods = data.foods;
                }
                if (data.type === 'dead') {
                    gameOver = true;
                    clearInterval(gameLoop);
                    document.getElementById('winner').textContent = 'Победа!';
                }
            };
            dc.onclose = () => {
                document.getElementById('status').textContent = 'Соединение разорвано';
            };
        }

        function randomFood() {
            let f;
            do {
                f = { x: Math.floor(Math.random() * W), y: Math.floor(Math.random() * H) };
            } while (
                (mySnake && mySnake.some(s => s.x === f.x && s.y === f.y)) ||
                (enemySnake && enemySnake.some(s => s.x === f.x && s.y === f.y)) ||
                (foods && foods.some(f2 => f2.x === f.x && f2.y === f.y))
            );
            return f;
        }

        function startGameLoop() {
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(() => {
                if (gameOver || !alive || !dc || dc.readyState !== 'open') return;

                const head = { x: mySnake[0].x + myDir.x, y: mySnake[0].y + myDir.y };

                if (head.x < 0 || head.x >= W || head.y < 0 || head.y >= H) { die(); return; }
                if (mySnake.some(s => s.x === head.x && s.y === head.y)) { die(); return; }
                if (enemySnake && enemySnake.some(s => s.x === head.x && s.y === head.y)) { die(); return; }

                mySnake.unshift(head);

                if (foods) {
                    const ate = foods.find(f => f.x === head.x && f.y === head.y);
                    if (ate) {
                        myScore += 10;
                        foods = foods.filter(f => f !== ate);
                        foods.push(randomFood());
                        if (dc.readyState === 'open') dc.send(JSON.stringify({ type: 'foods', foods }));
                    } else {
                        mySnake.pop();
                    }
                } else {
                    mySnake.pop();
                }

                if (dc.readyState === 'open') {
                    dc.send(JSON.stringify({ type: 'update', snake: mySnake, score: myScore }));
                }

                document.getElementById('myScore').textContent = myScore;
                draw();
            }, 120);
        }

        function die() {
            alive = false;
            gameOver = true;
            clearInterval(gameLoop);
            if (dc && dc.readyState === 'open') {
                dc.send(JSON.stringify({ type: 'dead' }));
            }
            document.getElementById('winner').textContent = 'Поражение';
            draw();
        }

        function changeDir(dx, dy) {
            if (gameOver || !alive) return;
            if (myDir.x + dx === 0 && myDir.y + dy === 0) return;
            myDir = { x: dx, y: dy };
        }

        document.addEventListener('keydown', e => {
            const dirs = {
                ArrowUp: [0,-1], ArrowDown: [0,1],
                ArrowLeft: [-1,0], ArrowRight: [1,0],
                w: [0,-1], s: [0,1], a: [-1,0], d: [1,0]
            };
            if (dirs[e.key]) changeDir(dirs[e.key][0], dirs[e.key][1]);
        });

        let tsX=0, tsY=0;
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            tsX = e.touches[0].clientX;
            tsY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            const dx = e.changedTouches[0].clientX - tsX;
            const dy = e.changedTouches[0].clientY - tsY;
            if (Math.abs(dx) > Math.abs(dy)) changeDir(dx > 0 ? 1 : -1, 0);
            else changeDir(0, dy > 0 ? 1 : -1);
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (foods) {
                foods.forEach(f => {
                    ctx.fillStyle = '#f0c929';
                    ctx.fillRect(f.x*SIZE+3, f.y*SIZE+3, SIZE-6, SIZE-6);
                });
            }
            if (mySnake) {
                mySnake.forEach((s,i) => {
                    ctx.fillStyle = i===0?'#00ff88':`rgba(0,255,136,${0.5-i*0.02})`;
                    ctx.fillRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2);
                });
            }
            if (enemySnake) {
                enemySnake.forEach((s,i) => {
                    ctx.fillStyle = i===0?'#ff6b6b':`rgba(255,107,107,${0.5-i*0.02})`;
                    ctx.fillRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2);
                });
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
